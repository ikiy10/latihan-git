<!DOCTYPE html>
<html>
<head>
    <title>Keahlian Rizky</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
        }

        .container{
            width:80%;
            margin:auto;
            background:white;
            padding:20px;
            margin-top:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        .skill{
            margin-top:20px;
        }

        .skill p{
            font-size:18px;
            margin:5px 0;
        }

        .bar{
            background:#ddd;
            border-radius:20px;
            overflow:hidden;
        }

        .progress{
            height:20px;
            background:#007BFF;
            text-align:right;
            color:white;
            padding-right:5px;
            line-height:20px;
        }

        footer{
            text-align:center;
            margin-top:20px;
            color:gray;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Keahlian Saya</h1>

    <div class="skill">
        <p>HTML</p>
        <div class="bar">
            <div class="progress" style="width:80%">80%</div>
        </div>
    </div>

    <div class="skill">
        <p>CSS</p>
        <div class="bar">
            <div class="progress" style="width:70%">70%</div>
        </div>
    </div>

    <div class="skill">
        <p>Laravel</p>
        <div class="bar">
            <div class="progress" style="width:65%">65%</div>
        </div>
    </div>

    <div class="skill">
        <p>Linux</p>
        <div class="bar">
            <div class="progress" style="width:75%">75%</div>
        </div>
    </div>

    <div class="skill">
        <p>Git</p>
        <div class="bar">
            <div class="progress" style="width:60%">60%</div>
        </div>
    </div>

</div>

<footer>
<p>© 2026 Rizky</p>
</footer>

</body>
</html>
